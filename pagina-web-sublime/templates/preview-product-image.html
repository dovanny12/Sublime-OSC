<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista previa imagen de producto</title>
    <link rel="stylesheet" href="pagina web/static/css/home.css">
</head>
<body style="background: #111; color: #fff; padding: 40px; font-family: sans-serif;">
    <h1>Vista previa de la imagen del producto</h1>
    <div class="products-grid" style="max-width: 980px; margin-top: 30px;">
        <div class="product-card">
            <div class="badge">Nuevo</div>
            <div class="product-image">
                <img src="pagina web/static/images/botella-agua-blanca-reutilizable_53876-145536.avif" alt="Botella Sublime">
            </div>
            <div class="product-info">
                <div class="category-tag">Accesorio</div>
                <h3>Botella Sublime</h3>
                <p class="price">$12.000</p>
                <div class="card-actions">
                    <button class="btn-outline" type="button">Ver</button>
                    <button class="btn-secondary" type="button">Añadir</button>
                </div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-image">
                <img src="pagina web/static/images/conjunto-llaveros-metal-redondo-cuadrado-hexagonal_107791-802.avif" alt="Llaveros Metalicos">
            </div>
            <div class="product-info">
                <div class="category-tag">Accesorio</div>
                <h3>Pack de Llaveros</h3>
                <p class="price">$8.500</p>
                <div class="card-actions">
                    <button class="btn-outline" type="button">Ver</button>
                    <button class="btn-secondary" type="button">Añadir</button>
                </div>
            </div>
        </div>
    </div>
    <script src="pagina web/static/js/script.js"></script>
</body>
</html>
